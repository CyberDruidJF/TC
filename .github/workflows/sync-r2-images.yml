name: Sync R2 to GitHub
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          aws s3 sync s3://dlc ./images --delete \
            --endpoint-url https://bfa7567bee55c265bdd3fba7d45efb95.r2.cloudflarestorage.com
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
      - run: |
          git config user.name "R2 Sync"
          git config user.email "bot@sync.local"
          git add images/
          if ! git diff --staged --quiet; then
            git commit -m "sync: $(date -u +%Y-%m-%dT%H:%M)"
            git push
          fi
